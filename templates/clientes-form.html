{% extends "base.html" %}

{% block titulo %}{{ 'Editar' if cliente else 'Novo' }} Cliente - {{ super() }}{% endblock %}

{% block conteudo %}
<div class="container">
    <h1>{{ 'Editar' if cliente else 'Cadastrar Novo' }} Cliente {{cliente_id}}</h1>
    
    <form id="formCliente" class="form-cliente">
        <div class="form-group">
            <label for="nome">Nome *</label>
            <input type="text" id="nome" name="nome" class="form-control" value="{{ cliente.nome if cliente else '' }}" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" class="form-control" value="{{ cliente.email if cliente else '' }}" required>
        </div>
        
        <div class="form-group">
            <label for="telefone">Telefone *</label>
            <input type="tel" id="telefone" name="telefone" class="form-control" placeholder="(00) 00000-0000" value="{{ cliente.telefone if cliente else '' }}" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ 'Atualizar' if cliente else 'Cadastrar' }} Cliente</button>
            <a href="/clientes" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script>
// Define se é edição ou criação
const isEdit = {{ 'true' if cliente else 'false' }};
const clienteId = {{ cliente.id_ if cliente else 'null' }};

document.getElementById('formCliente').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        telefone: document.getElementById('telefone').value
    };
    
    try {
        const url = isEdit ? `/api/clientes/${clienteId}` : '/api/clientes/';
        const method = isEdit ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });
        
        if (response.ok) {
            mostrarToast(`Cliente ${isEdit ? 'atualizado' : 'cadastrado'} com sucesso!`, 'success');
            setTimeout(() => {
                window.location.href = '/clientes';
            }, 1500);
        } else {
            const error = await response.json();
            mostrarToast(`Erro ao ${isEdit ? 'atualizar' : 'cadastrar'} cliente: ` + (error.detail || 'Erro desconhecido'), 'danger');
        }
    } catch (error) {
        mostrarToast(`Erro ao ${isEdit ? 'atualizar' : 'cadastrar'} cliente: ` + error.message, 'danger');
    }
});
</script>
{% endblock %}
