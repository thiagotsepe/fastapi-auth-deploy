{% extends "base.html" %}
{% block conteudo %}
<div class="container">
    <h1>Criar Conta</h1>
    
    <form id="formRegistro" class="form-registro" action="/registro" method="post">
        <div class="form-group">
            <label for="nome">Nome completo *</label>
            <input type="text" id="nome" name="nome" class="form-control" value="{{ nome }}" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" class="form-control" value="{{ email }}" required>
        </div>
        
        <div class="form-group">
            <label for="senha">Senha *</label>
            <input type="password" id="senha" name="senha" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>
        
        <div class="form-group">
            <label for="confirma_senha">Confirmar senha *</label>
            <input type="password" id="confirma_senha" name="confirma_senha" class="form-control" placeholder="Digite a senha novamente" required>
        </div>
        
        {% if error %}
            <div class="alert alert-error">
                <p>{{ error }}</p>
            </div>
        {% endif %}
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Criar Conta</button>
            <a href="/login" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
    
    <div class="login-link">
        <p>Já tem uma conta? <a href="/login">Fazer login</a></p>
    </div>
</div>

{% endblock %}
